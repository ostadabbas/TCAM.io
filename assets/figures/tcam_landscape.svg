<svg viewBox="40 45 742 458" xmlns="http://www.w3.org/2000/svg" font-family="'Times New Roman', Times, serif">
  <defs>
    <filter id="halo" x="-90%" y="-90%" width="280%" height="280%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#e0a52a" flood-opacity="0.55"/>
    </filter>
    <!-- query-based pocket (warm, at referring corner) -> query-free volume (cool) -->
    <radialGradient id="qgrad" gradientUnits="userSpaceOnUse" cx="232" cy="163" r="285">
      <stop offset="0%"  stop-color="#ef8c1a" stop-opacity="0.34"/>
      <stop offset="38%" stop-color="#cdb6c9" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4a90e2" stop-opacity="0.22"/>
    </radialGradient>
    <linearGradient id="fTop"   x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
  </defs>

  <!-- ===== cube interior: depth + query gradient ===== -->
  <!-- whole hexagon filled with query gradient -->
  <polygon points="410,75 588,163 588,338 410,425 232,338 232,163" fill="url(#qgrad)"/>
  <!-- faint top-face lightening for 3D -->
  <polygon points="410,75 588,163 410,250 232,163" fill="url(#fTop)"/>
  <!-- side faces very subtle shade -->
  <polygon points="588,163 588,338 410,425 410,250" fill="#000000" opacity="0.035"/>
  <polygon points="232,163 410,250 410,425 232,338" fill="#000000" opacity="0.06"/>

  <!-- ===== cube edges ===== -->
  <!-- outer hexagon (solid, neutral) -->
  <g stroke="#8a909a" stroke-width="1.7" fill="none">
    <polygon points="410,75 588,163 588,338 410,425 232,338 232,163"/>
  </g>
  <!-- back spokes to axis ends (dashed, faint) -->
  <g stroke="#b7bcc4" stroke-width="1.4" stroke-dasharray="5 5" fill="none">
    <line x1="410" y1="250" x2="410" y2="75"/>
    <line x1="410" y1="250" x2="588" y2="338"/>
    <line x1="410" y1="250" x2="232" y2="338"/>
  </g>
  <!-- front spokes: TCAM unifies the three task corners (colored) -->
  <g stroke-width="2" fill="none">
    <line x1="410" y1="250" x2="588" y2="163" stroke="#4a90e2"/>
    <line x1="410" y1="250" x2="232" y2="163" stroke="#ef8c1a"/>
    <line x1="410" y1="250" x2="410" y2="425" stroke="#9c27b0"/>
  </g>

  <!-- ===== query-region cues (inside the cube) ===== -->
  <text x="322" y="138" text-anchor="middle" font-size="13" font-style="italic" fill="#c0700d">query-based</text>
  <text x="492" y="298" text-anchor="middle" font-size="13" font-style="italic" fill="#2f6db3">query-free</text>

  <!-- ===== axis ends ===== -->
  <circle cx="410" cy="75"  r="5" fill="#aab0b8"/>
  <text x="410" y="62"  text-anchor="middle" font-size="15" fill="#5a5f66">Space</text>
  <circle cx="588" cy="338" r="5" fill="#aab0b8"/>
  <text x="600" y="343" text-anchor="start" font-size="15" fill="#5a5f66">Time</text>
  <circle cx="232" cy="338" r="5" fill="#aab0b8"/>
  <text x="220" y="343" text-anchor="end" font-size="15" fill="#5a5f66">Language</text>

  <!-- ===== TASK: Point tracking (Space+Time) ===== -->
  <circle cx="588" cy="163" r="8.5" fill="#fff" stroke="#4a90e2" stroke-width="3"/>
  <text x="603" y="152" text-anchor="start" font-size="16" font-weight="700" fill="#2c5d8f">Point tracking</text>
  <text x="603" y="169" text-anchor="start" font-size="12" font-style="italic" fill="#6f7680">CoTracker3 · TAPIR</text>
  <text x="603" y="185" text-anchor="start" font-size="12" fill="#4a90e2">[ TAP-Vid ]</text>

  <!-- ===== TASK: Referring segmentation (Space+Language) ===== -->
  <circle cx="232" cy="163" r="8.5" fill="#fff" stroke="#ef8c1a" stroke-width="3"/>
  <text x="217" y="152" text-anchor="end" font-size="16" font-weight="700" fill="#b35e00">Referring segmentation</text>
  <text x="217" y="169" text-anchor="end" font-size="12" font-style="italic" fill="#6f7680">ReferFormer · MARIS</text>
  <text x="217" y="185" text-anchor="end" font-size="12" fill="#ef8c1a">[ MeViS · Ref-YT-VOS ]</text>

  <!-- ===== TASK: Dense captioning (Time+Language) ===== -->
  <circle cx="410" cy="425" r="8.5" fill="#fff" stroke="#9c27b0" stroke-width="3"/>
  <text x="410" y="448" text-anchor="middle" font-size="16" font-weight="700" fill="#6a1b9a">Dense video captioning</text>
  <text x="410" y="465" text-anchor="middle" font-size="12" font-style="italic" fill="#6f7680">Vid2Seq · TimeChat</text>
  <text x="410" y="481" text-anchor="middle" font-size="12" fill="#9c27b0">[ ActivityNet Captions ]</text>

  <!-- ===== TCAM (all three, centre) ===== -->
  <g filter="url(#halo)">
    <path transform="translate(410,250)" d="M0,-16 L4.5,-5 L16,-5 L6.7,2.5 L10.3,14 L0,7 L-10.3,14 L-6.7,2.5 L-16,-5 L-4.5,-5 Z"
          fill="#f5a623" stroke="#cf8400" stroke-width="1.2"/>
  </g>
  <text x="428" y="246" text-anchor="start" font-size="18" font-weight="800" fill="#2b3a82">TCAM</text>
  <text x="428" y="262" text-anchor="start" font-size="12" font-style="italic" fill="#3b4ea8">(ours)</text>
</svg>
